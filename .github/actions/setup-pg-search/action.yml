name: Setup pg_search build environment
description: Install PostgreSQL, Rust, and cargo-pgrx for pg_search

inputs:
  pg-version:
    description: PostgreSQL major version
    required: true
    default: "17"

runs:
  using: composite
  steps:
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin/cargo-pgrx
          target
        key: ${{ runner.os }}-cargo-pg${{ inputs.pg-version }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-pg${{ inputs.pg-version }}-

    - name: Install PostgreSQL (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get install -y curl ca-certificates
        sudo install -d /usr/share/postgresql-common/pgdg
        sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
        echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
        sudo apt-get update
        sudo apt-get install -y postgresql-server-dev-${{ inputs.pg-version }} postgresql-${{ inputs.pg-version }}

    - name: Install PostgreSQL (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install postgresql@${{ inputs.pg-version }}

    - name: Install cargo-pgrx
      shell: bash
      run: |
        PGRX_VERSION=$(grep 'pgrx =' Cargo.toml | head -n 1 | cut -d '"' -f 2 | tr -d '=')
        if ! cargo pgrx --version 2>/dev/null | grep -q "$PGRX_VERSION"; then
          cargo install cargo-pgrx --locked --version "$PGRX_VERSION"
        fi

    - name: Initialize pgrx
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "macOS" ]; then
          cargo pgrx init --pg${{ inputs.pg-version }}=$(brew --prefix postgresql@${{ inputs.pg-version }})/bin/pg_config
        else
          cargo pgrx init --pg${{ inputs.pg-version }}=$(which pg_config)
        fi
